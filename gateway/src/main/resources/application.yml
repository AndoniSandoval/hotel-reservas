server:
  port: 8090

spring:
  application:
    name: gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9000/oauth2/jwks
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: msv-
              uri: lb://msv-
              predicates:
                - Path=/api/-/**
              filters:
                - StripPrefix=2
    loadbalancer:
      enabled: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka